name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dynamicwepubmonitor
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dynamicwepubmonitor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/dynamicwepubmonitor
      DATABASE_ECHO: "false"
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-secret
      APP_ENV: development
      DEBUG: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv sync --frozen --extra dev
      - run: uv run python -m app.utils.bootstrap_fresh_db
      - run: uv run alembic upgrade head
      - run: uv run ruff check app tests scripts
      - run: uv run pytest -q
      - run: uv run python -m compileall app tests scripts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure local reference files are not tracked
        run: test -z "$(git ls-files external_references)"
      - run: docker compose config
      - run: docker compose build

  publish-image:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/pakhomleo/just-we:latest
            ghcr.io/pakhomleo/just-we:0.1.0
            ghcr.io/pakhomleo/just-we:main-${{ github.sha }}
