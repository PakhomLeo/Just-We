name: Bug report
description: Report a reproducible problem in Just-We.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Start the service with ...
        2. Log in as ...
        3. Open ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Docker or local install, browser, and relevant versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets, tokens, QR data, and personal information before sharing.
      render: shell
